<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
</head>
<body>

    <h1>User Registration</h1>

    <form action="">

        <label for="name">Full Name :</label>
        <input type="text" id="name" placeholder="Enter your full name">
        <br><br>

        <label for="flat">Flat / House Number :</label>
        <input type="text" id="flat" placeholder="Enter flat number">
        <br><br>

        <label for="email">Email :</label>
        <input type="email" id="email" placeholder="Enter your email">
        <br><br>

        <label for="mobile">Mobile Number :</label>
        <input type="tel" id="mobile" placeholder="Enter mobile number">
        <br><br>

        <label for="password">Password :</label>
        <input type="password" id="password" placeholder="Enter password">
        <br><br>

        <label for="confirmPassword">Confirm Password :</label>
        <input type="password" id="confirmPassword" placeholder="Confirm password">
        <br><br>

        <label>Resident Type :</label>
        <input type="radio" id="owner" name="residentType">
        <label for="owner">Owner</label>

        <input type="radio" id="tenant" name="residentType">
        <label for="tenant">Tenant</label>
        <br><br>

        <input type="submit" value="Register">
    </form>

</body>
</html>
