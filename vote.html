<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote</title>
</head>
<body>

    <h1>President Election</h1>

    <form action="">

        <p><b>Candidate Name:</b> A</p>
        <p><b>Flat Number:</b> A-101</p>
        <p><b>Position Applied For:</b> President</p>
        <p><b>Manifesto:</b> Improve security and cleanliness.</p>

        <input type="radio" id="raj" name="candidate" value="Raj Kumar">
        <label for="raj">Vote for A</label>

        <br><br>

        <p><b>Candidate Name:</b> B</p>
        <p><b>Flat Number:</b> B-205</p>
        <p><b>Position Applied For:</b> President</p>
        <p><b>Manifesto:</b> Better facilities and transparent management.</p>

        <input type="radio" id="priya" name="candidate" value="Priya Sharma">
        <label for="priya">Vote for B</label>

        <br><br>

        <input type="submit" value="Submit Vote">

    </form>

</body>
</html>
