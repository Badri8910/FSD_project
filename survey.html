<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="">
        <div>
            <h3>Cleanliness satisfaction</h3>
            <input type="radio" id="Very good" name="clean">
            <label for="Very good">Very good</label>
            <br>
            <input type="radio" id="Good" name="clean">
            <label for="Good">Good</label>
            <br>
            <input type="radio" id="Average" name="clean">
            <label for="Average">Average</label>
            <br>
            <input type="radio" id="Bad" name="clean">
            <label for="Bad">Bad</label>
            <br>
            <input type="radio" id="Very Bad" name="clean">
            <label for="Very Bad">Very Bad</label>
        </div>

        <br><br>

        <label for="security">Security Service Feedback :</label><br>
        <textarea id="security" rows="4" cols="40" placeholder="Enter your feedback"></textarea>

        <br><br>

        <h3>Parking issues</h3>
        <input type="checkbox" id="limited">
        <label for="limited">Limited Parking</label><br>

        <input type="checkbox" id="unauthorized">
        <label for="unauthorized">Unauthorized Parking</label>
        <br><br>

        <label for="water">Water Supply Feedback :</label><br>
        <textarea id="water" rows="4" cols="40" placeholder="Enter your feedback"></textarea>

        <br><br>

        <label for="maintenance">Maintenance Quality :</label>
        <select id="maintenance">
            <option>Excellent</option>
            <option>Good</option>
            <option>Average</option>
            <option>Poor</option>
        </select>

        <br><br>

        <label for="suggestions">Suggestions :</label><br>
        <textarea id="suggestions" rows="5" cols="40" placeholder="Enter your suggestions"></textarea>

        <br><br>

        <input type="submit" value="Submit">
    </form>
</body>

</html>
